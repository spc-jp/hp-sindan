<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホームページ診断ツール</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #f0f4f8; color: #333; }
  header { background: #223670; color: white; padding: 20px; text-align: center; }
  header h1 { font-size: 22px; }
  header p { font-size: 13px; margin-top: 5px; opacity: 0.8; }
  .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
  .input-box { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .input-box h2 { font-size: 18px; margin-bottom: 15px; color: #223670; }
  .input-row { display: flex; gap: 10px; }
  input[type="text"] { flex: 1; padding: 12px 16px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
  input[type="text"]:focus { border-color: #223670; }
  button { background: #D0A900; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; }
  button:hover { background: #b89200; }
  .loading { text-align: center; padding: 40px; display: none; }
  .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: #223670; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result { display: none; margin-top: 20px; }
  .risk-banner { border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; color: white; }
  .risk-高 { background: #e53935; }
  .risk-中 { background: #fb8c00; }
  .risk-低 { background: #43a047; }
  .risk-banner h2 { font-size: 22px; }
  .risk-banner p { font-size: 14px; margin-top: 5px; opacity: 0.9; }
  .scores { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
  .score-card { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .score-card h3 { font-size: 13px; color: #888; margin-bottom: 10px; }
  .score-num { font-size: 48px; font-weight: bold; line-height: 1; }
  .score-label { font-size: 12px; margin-top: 5px; }
  .score-高 { color: #e53935; }
  .score-中 { color: #fb8c00; }
  .score-低 { color: #43a047; }
  .info-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
  .info-card { background: white; border-radius: 12px; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 12px; }
  .info-icon { font-size: 28px; }
  .info-text h3 { font-size: 13px; color: #888; }
  .info-text p { font-size: 15px; font-weight: bold; margin-top: 2px; }
  .sales-box { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .sales-box h3 { font-size: 16px; color: #223670; margin-bottom: 15px; border-bottom: 2px solid #223670; padding-bottom: 8px; }
  .sales-point { background: #f8f9ff; border-left: 4px solid #223670; padding: 12px 16px; margin-bottom: 10px; border-radius: 0 8px 8px 0; font-size: 14px; line-height: 1.6; }
  .error-box { background: #fff3f3; border: 1px solid #ffcdd2; border-radius: 12px; padding: 20px; text-align: center; color: #c62828; display: none; margin-top: 20px; }
  @media(max-width: 600px) {
    .scores { grid-template-columns: 1fr 1fr; }
    .info-cards { grid-template-columns: 1fr 1fr; }
    .input-row { flex-direction: column; }
  }
</style>
</head>
<body>
<header>
  <h1>🔍 ホームページ診断ツール</h1>
  <p>URLを入力するだけで、ホームページの課題を即診断します</p>
</header>

<div class="container">
  <div class="input-box">
    <h2>診断したいホームページのURLを入力してください</h2>
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="https://example.com" />
      <button onclick="diagnose()">診断する</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Googleのデータで診断中です...<br>少々お待ちください（約10〜20秒）</p>
  </div>

  <div class="error-box" id="errorBox">
    <p>⚠️ 診断に失敗しました。URLを確認してもう一度お試しください。</p>
  </div>

  <div class="result" id="result">
    <div class="risk-banner" id="riskBanner">
      <h2 id="riskTitle"></h2>
      <p id="riskDesc"></p>
    </div>

    <div class="scores">
      <div class="score-card">
        <h3>📱 モバイル速度</h3>
        <div class="score-num" id="mobileScore">-</div>
        <div class="score-label" id="mobileLabel"></div>
      </div>
      <div class="score-card">
        <h3>💻 PC速度</h3>
        <div class="score-num" id="desktopScore">-</div>
        <div class="score-label" id="desktopLabel"></div>
      </div>
    </div>

    <div class="info-cards">
      <div class="info-card">
        <div class="info-icon">🔒</div>
        <div class="info-text">
          <h3>SSL（セキュリティ）</h3>
          <p id="sslStatus"></p>
        </div>
      </div>
      <div class="info-card">
        <div class="info-icon">🌐</div>
        <div class="info-text">
          <h3>WordPress</h3>
          <p id="wpStatus"></p>
        </div>
      </div>
    </div>

    <div class="sales-box">
      <h3>💬 営業トークのポイント</h3>
      <div id="salesPoints"></div>
    </div>
  </div>
</div>

<script>
const WORKER_URL = 'https://hp-sindan-api.yymmatsu.workers.dev';

function getScoreClass(score) {
  if (score < 50) return '高';
  if (score < 70) return '中';
  return '低';
}

function getScoreLabel(score) {
  if (score < 50) return '⚠️ 要改善';
  if (score < 70) return '△ やや遅い';
  return '✅ 良好';
}

function getSalesPoints(data) {
  const points = [];
  if (data.mobile < 50) points.push('📱 モバイルの表示速度が非常に遅く、スマホで見たお客様が離脱しているリスクが高い状態です。');
  else if (data.mobile < 70) points.push('📱 モバイルの表示速度がやや遅めです。スマホユーザーの離脱につながっている可能性があります。');
  if (data.desktop < 50) points.push('💻 PCでの表示速度も遅く、第一印象で損をしている可能性があります。');
  if (!data.isSSL) points.push('🔓 SSLが設定されていません。「保護されていない通信」と表示されており、お客様に不安を与えています。今すぐ対応が必要です。');
  if (data.isWordPress) points.push('⚠️ WordPressが使われています。更新を怠ると不正アクセスやウイルス感染のリスクが高まります。');
  if (data.risk === '低') points.push('✅ 基本的なパフォーマンスは良好です。さらなる集客強化やデザインリニューアルでより効果が出ます。');
  if (points.length === 0) points.push('📊 診断完了です。詳しい改善提案はお気軽にご相談ください。');
  return points;
}

async function diagnose() {
  let url = document.getElementById('urlInput').value.trim();
  if (!url) { alert('URLを入力してください'); return; }
  if (!url.startsWith('http')) url = 'https://' + url;

  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';

  try {
    const res = await fetch(`${WORKER_URL}/?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const riskBanner = document.getElementById('riskBanner');
    riskBanner.className = `risk-banner risk-${data.risk}`;
    document.getElementById('riskTitle').textContent =
      data.risk === '高' ? '⚠️ リスクが高い状態です' :
      data.risk === '中' ? '△ 改善の余地があります' : '✅ 基本的に良好です';
    document.getElementById('riskDesc').textContent = `診断URL: ${data.url}`;

    const mobileEl = document.getElementById('mobileScore');
    mobileEl.textContent = data.mobile;
    mobileEl.className = `score-num score-${getScoreClass(data.mobile)}`;
    document.getElementById('mobileLabel').textContent = getScoreLabel(data.mobile);

    const desktopEl = document.getElementById('desktopScore');
    desktopEl.textContent = data.desktop;
    desktopEl.className = `score-num score-${getScoreClass(data.desktop)}`;
    document.getElementById('desktopLabel').textContent = getScoreLabel(data.desktop);

    document.getElementById('sslStatus').textContent = data.isSSL ? '✅ 設定済み' : '❌ 未設定';
    document.getElementById('wpStatus').textContent = data.isWordPress ? '⚠️ 使用中' : '✅ 非WordPress';

    const salesEl = document.getElementById('salesPoints');
    salesEl.innerHTML = getSalesPoints(data).map(p => `<div class="sales-point">${p}</div>`).join('');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('result').style.display = 'block';

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('errorBox').style.display = 'block';
  }
}

document.getElementById('urlInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') diagnose();
});
</script>
</body>
</html>
