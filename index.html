<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホームページ診断ツール | Smartpage</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f0f4f8;color:#333;min-height:100vh}
header{background:#223670;color:#fff;padding:18px 20px;text-align:center}
header h1{font-size:20px;font-weight:500;letter-spacing:.04em}
header p{font-size:12px;margin-top:4px;opacity:.8}
.container{max-width:820px;margin:24px auto;padding:0 16px}
.input-box{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 16px rgba(0,0,0,.08);margin-bottom:20px}
.input-box h2{font-size:15px;margin-bottom:12px;color:#223670;font-weight:500}
.input-row{display:flex;gap:8px}
input[type=text]{flex:1;padding:11px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none;font-family:inherit;transition:border-color .2s}
input[type=text]:focus{border-color:#223670}
.btn-diag{background:#D0A900;color:#fff;border:none;padding:11px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;position:relative;overflow:hidden;white-space:nowrap;transition:background .2s}
.btn-diag:hover{background:#b89200}
.btn-diag.running{background:#223670;pointer-events:none}
.scan-bar{position:absolute;left:0;top:-2px;width:100%;height:2px;background:rgba(255,255,255,.8);display:none;animation:scanY .65s linear infinite}
@keyframes scanY{0%{top:-2px}100%{top:102%}}

/* ===== アイちゃん診断アニメーション ===== */
.loading-scene{display:none;padding:2rem 0 1.5rem;text-align:center}
.radar-stage{position:relative;width:240px;height:240px;margin:0 auto 16px}
.ring{position:absolute;border-radius:50%;border:1.5px solid rgba(34,54,112,.25);top:50%;left:50%;transform:translate(-50%,-50%)}
.ring1{width:70px;height:70px}
.ring2{width:120px;height:120px}
.ring3{width:170px;height:170px}
.ring4{width:220px;height:220px}
.sweep{position:absolute;top:50%;left:50%;width:120px;height:2px;transform-origin:left center;background:linear-gradient(90deg,rgba(34,54,112,.9),rgba(34,54,112,0));animation:sweep 1.8s linear infinite}
@keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.pulse-dot{position:absolute;border-radius:50%;animation:pdot 1.8s ease-in-out infinite}
@keyframes pdot{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.3)}}
.ai-float{position:absolute;bottom:0;left:50%;transform:translateX(-50%);animation:float 2.2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-10px)}}
.ai-float img{width:80px;height:80px;object-fit:contain}
.bubble-scan{position:absolute;bottom:84px;left:50%;transform:translateX(-50%);background:#fff;border:1.5px solid #223670;border-radius:10px 10px 10px 0;padding:6px 12px;font-size:11px;color:#223670;font-weight:700;white-space:nowrap;animation:bubbleblink 1.6s ease-in-out infinite}
.bubble-scan::after{content:'';position:absolute;bottom:-7px;left:12px;border:4px solid transparent;border-top-color:#223670}
@keyframes bubbleblink{0%,100%{opacity:.4}50%{opacity:1}}
.loading-sub{font-size:12px;color:#888;margin-top:4px}

/* ===== 結果エリア ===== */
.result-area{display:none}
.ai-comment-row{display:flex;align-items:flex-end;gap:12px;margin-bottom:14px;animation:slideIn .4s ease}
.ai-comment-row img{width:62px;height:62px;object-fit:contain;flex-shrink:0}
.ai-bubble{background:#fff;border:1.5px solid #223670;border-radius:12px 12px 12px 0;padding:10px 14px;font-size:13px;line-height:1.7;color:#223670;animation:popIn .4s ease}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

.risk-banner{border-radius:12px;padding:16px 20px;margin-bottom:14px;color:#fff}
.risk-banner h2{font-size:16px;font-weight:500}
.risk-banner p{font-size:12px;margin-top:4px;opacity:.85}
.risk-high{background:#c62828}.risk-mid{background:#e65100}.risk-low{background:#2e7d32}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.card h3{font-size:11px;color:#888;margin-bottom:10px;font-weight:400;text-align:center}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.sc{background:#f7f8fa;border-radius:8px;padding:10px 6px;text-align:center}
.sc-lbl{font-size:9px;color:#888;margin-bottom:3px}
.sc-num{font-size:24px;font-weight:700;line-height:1}
.sc-tag{font-size:9px;margin-top:2px}
.c-danger{color:#c62828}.c-warn{color:#e65100}.c-ok{color:#2e7d32}
.info-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ic{background:#f7f8fa;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:8px}
.ic-icon{font-size:18px}
.ic-lbl{font-size:9px;color:#888}
.ic-val{font-size:12px;font-weight:700;margin-top:1px}

/* ===== ご提案内容 ===== */
.proposal-box{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.proposal-box h3{font-size:14px;font-weight:700;color:#223670;border-bottom:2px solid #223670;padding-bottom:8px;margin-bottom:14px}
.prop-item{margin-bottom:10px;border-radius:8px;overflow:hidden;animation:fadeSlide .5s ease both}
@keyframes fadeSlide{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.prop-item:nth-child(1){animation-delay:.1s}
.prop-item:nth-child(2){animation-delay:.2s}
.prop-item:nth-child(3){animation-delay:.3s}
.prop-item:nth-child(4){animation-delay:.4s}
.prop-item:nth-child(5){animation-delay:.5s}
.prop-head{font-size:12px;font-weight:700;padding:7px 14px;color:#fff}
.prop-body{font-size:12px;line-height:1.75;padding:10px 14px;border-left:3px solid}
.urgent .prop-head{background:#c62828}
.urgent .prop-body{border-color:#c62828;background:#fff8f8;color:#333}
.warn .prop-head{background:#e65100}
.warn .prop-body{border-color:#e65100;background:#fff9f5;color:#333}
.good .prop-head{background:#2e7d32}
.good .prop-body{border-color:#2e7d32;background:#f5fff6;color:#333}

.error-box{background:#fff3f3;border:1px solid #ffcdd2;border-radius:12px;padding:18px;text-align:center;color:#c62828;display:none;margin-bottom:16px;font-size:13px}
@media(max-width:580px){
  .two-col{grid-template-columns:1fr}
  .input-row{flex-direction:column}
  .radar-stage{width:200px;height:200px}
}
</style>
</head>
<body>
<header>
  <h1>🔍 ホームページ診断ツール</h1>
  <p>AIナビゲーター「アイ」がGoogleのデータでサイトの課題を即診断します</p>
</header>
<div class="container">
  <div class="input-box">
    <h2>診断したいホームページのURLを入力してください</h2>
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="https://example.com"/>
      <button class="btn-diag" id="diagBtn" onclick="diagnose()">
        <span class="scan-bar" id="scanBar"></span>
        <span id="btnLabel">診断する</span>
      </button>
    </div>
  </div>

  <div class="error-box" id="errorBox">⚠️ 診断に失敗しました。URLを確認してもう一度お試しください。</div>

  <!-- アイちゃんアニメーション -->
  <div class="loading-scene" id="loadingScene">
    <div class="radar-stage">
      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>
      <div class="ring ring4"></div>
      <div class="sweep"></div>
      <div class="pulse-dot" style="width:9px;height:9px;background:rgba(208,169,0,.8);top:30%;left:64%"></div>
      <div class="pulse-dot" style="width:7px;height:7px;background:rgba(34,54,112,.7);top:60%;left:26%;animation-delay:.6s"></div>
      <div class="pulse-dot" style="width:8px;height:8px;background:rgba(208,169,0,.7);top:42%;left:72%;animation-delay:1.1s"></div>
      <div class="bubble-scan" id="speechBubble">スキャン中...</div>
      <div class="ai-float">
        <img id="aiFloatImg" src="" alt="アイ"/>
      </div>
    </div>
    <div class="loading-sub" id="loadingSub">Googleのデータで診断しています...</div>
  </div>

  <!-- 結果エリア -->
  <div class="result-area" id="resultArea">
    <div class="ai-comment-row">
      <img id="aiResultImg" src="" alt="アイ"/>
      <div class="ai-bubble" id="aiBubble">診断が完了しました！</div>
    </div>
    <div class="risk-banner" id="riskBanner">
      <h2 id="riskTitle"></h2>
      <p id="riskDesc"></p>
    </div>
    <div class="two-col">
      <div class="card">
        <h3>⬠ 総合スコア（レーダーチャート）</h3>
        <div style="position:relative;height:200px">
          <canvas id="radarChart" role="img" aria-label="5項目の総合診断レーダーチャート">モバイル速度・PC速度・SEO・セキュリティ・保守性の5軸評価</canvas>
        </div>
      </div>
      <div>
        <div class="score-grid">
          <div class="sc"><div class="sc-lbl">📱 モバイル</div><div class="sc-num" id="s-mobile">-</div><div class="sc-tag" id="t-mobile"></div></div>
          <div class="sc"><div class="sc-lbl">💻 PC速度</div><div class="sc-num" id="s-desktop">-</div><div class="sc-tag" id="t-desktop"></div></div>
          <div class="sc"><div class="sc-lbl">🔍 SEO</div><div class="sc-num" id="s-seo">-</div><div class="sc-tag" id="t-seo"></div></div>
          <div class="sc"><div class="sc-lbl">🛡 保守性</div><div class="sc-num" id="s-sec">-</div><div class="sc-tag" id="t-sec"></div></div>
        </div>
        <div class="info-row">
          <div class="ic"><div class="ic-icon">🔒</div><div><div class="ic-lbl">SSL</div><div class="ic-val" id="sslVal"></div></div></div>
          <div class="ic"><div class="ic-icon">🌐</div><div><div class="ic-lbl">WordPress</div><div class="ic-val" id="wpVal"></div></div></div>
        </div>
      </div>
    </div>
    <div class="proposal-box">
      <h3>💡 ご提案内容</h3>
      <div id="proposalPoints"></div>
    </div>
  </div>
</div>

let radarInst=null;
const speeches=['スキャン中...','セキュリティ確認中...','SEO解析中...','速度を計測中...','レポート生成中...'];
const subMsgs=['Googleのデータで診断しています...','セキュリティヘッダーを確認中...','WordPressの使用を確認中...','スコアを集計しています...','ご提案内容をまとめています...'];

document.getElementById('aiFloatImg').src=AI_IMG;
document.getElementById('aiResultImg').src=AI_IMG;

function cls(s){return s<50?'c-danger':s<70?'c-warn':'c-ok'}
function tag(s){return s<50?'⚠ 要改善':s<70?'△ やや弱い':'✓ 良好'}
function setScore(id,tid,v){
  const e=document.getElementById(id);e.textContent=v;e.className='sc-num '+cls(v);
  const t=document.getElementById(tid);t.textContent=tag(v);t.className='sc-tag '+cls(v);
}
function secScore(ssl,wp){return Math.max(0,80-(ssl?0:40)-(wp?20:0))}

function aiComment(d){
  if(!d.isSSL)return 'SSLが未設定です！訪問者に不安を与えています。早急な対応をおすすめします💦';
  if(d.mobile<50)return 'モバイルの速度がかなり遅いですね。スマホユーザーが離脱しているかもしれません。リニューアルの効果が一番出やすいポイントです！';
  if(d.mobile<70)return 'モバイル速度に改善の余地がありますよ。最適化で大きく改善できます😊';
  if(d.isWordPress)return 'WordPressを使用中ですね。セキュリティ対策とあわせたリニューアルをご提案できます！';
  return '全体的に良好な状態ですね✨さらなる集客強化やデザインリニューアルで差別化しましょう！';
}

function buildProposals(d){
  const pts=[];
  const mob=d.mobile,des=d.desktop,seo=d.seo||60;

  if(!d.isSSL) pts.push({c:'urgent',
    h:'🔓 【緊急】SSL設定の対応',
    b:'SSLが未設定のため、ブラウザに「保護されていない通信」と表示されています。訪問者の信頼を大きく損なっており、Googleの検索順位にも悪影響があります。即時対応をご提案します。'});

  if(mob<50) pts.push({c:'urgent',
    h:'📱 モバイル表示速度の大幅改善',
    b:`モバイルスコアが${mob}点と非常に低い状態です。スマホユーザーの大半がページ読み込み途中で離脱しているリスクがあります。画像圧縮・不要スクリプトの削除・キャッシュ設定を総合的に見直し、スコア70点以上を目標にリニューアルをご提案します。`});
  else if(mob<70) pts.push({c:'warn',
    h:'📱 モバイル表示速度の改善',
    b:`モバイルスコアが${mob}点とやや遅い状態です。画像の最適化とキャッシュ設定の見直しで改善できます。スマホ対応を強化し、離脱率を下げるリニューアルをご提案します。`});

  if(des<50) pts.push({c:'urgent',
    h:'💻 PC表示速度の改善',
    b:`PCスコアが${des}点と低く、第一印象で損をしています。サーバー設定・不要プラグインの削除・コード最適化をご提案します。`});
  else if(des<70) pts.push({c:'warn',
    h:'💻 PC表示速度のチューニング',
    b:`PCスコアが${des}点でやや改善の余地があります。コード最適化とリソースの整理でさらに快適な閲覧環境を実現できます。`});

  if(d.isWordPress) pts.push({c:'warn',
    h:'⚠️ WordPress セキュリティ・保守対策',
    b:'WordPressが使われています。更新が滞るとウイルス感染・不正アクセスのリスクが高まります。定期メンテナンスプランと、必要であればノーWordPress構成へのリニューアルをご提案します。'});

  if(seo<50) pts.push({c:'urgent',
    h:'🔍 SEO・集客力の緊急改善',
    b:`SEOスコアが${seo}点と低く、Googleの検索結果で非常に不利な状態です。タイトルタグ・メタディスクリプション・見出し構造の整備をご提案します。`});
  else if(seo<70) pts.push({c:'warn',
    h:'🔍 SEO・集客力の強化',
    b:`SEOスコアが${seo}点でまだ改善の余地があります。コンテンツ構成の見直しとキーワード戦略でさらなる集客力向上をご提案します。`});

  if(pts.length===0) pts.push({c:'good',
    h:'✅ 総合的に良好な状態です',
    b:'基本的なパフォーマンスは良好です。さらなるデザインリニューアルやコンテンツ強化・SNS連携で競合との差別化をご提案できます。お気軽にご相談ください。'});

  return pts;
}

function drawRadar(scores){
  if(radarInst){radarInst.destroy();radarInst=null}
  const ctx=document.getElementById('radarChart').getContext('2d');
  radarInst=new Chart(ctx,{
    type:'radar',
    data:{
      labels:['モバイル速度','PC速度','SEO','セキュリティ','保守性'],
      datasets:[{
        label:'スコア',data:scores,
        backgroundColor:'rgba(34,54,112,.15)',
        borderColor:'#223670',borderWidth:2,
        pointBackgroundColor:'#D0A900',
        pointBorderColor:'#223670',pointRadius:5
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{r:{min:0,max:100,ticks:{stepSize:25,font:{size:9},color:'#888'},
        grid:{color:'rgba(0,0,0,.08)'},pointLabels:{font:{size:10},color:'#555'}}},
      plugins:{legend:{display:false}}
    }
  });
}

async function diagnose(){
  let url=document.getElementById('urlInput').value.trim();
  if(!url){alert('URLを入力してください');return}
  if(!url.startsWith('http'))url='https://'+url;

  document.getElementById('resultArea').style.display='none';
  document.getElementById('errorBox').style.display='none';
  document.getElementById('loadingScene').style.display='block';
  document.getElementById('diagBtn').classList.add('running');
  document.getElementById('scanBar').style.display='block';
  document.getElementById('btnLabel').textContent='診断中...';

  let i=0;
  const timer=setInterval(()=>{
    i=(i+1)%speeches.length;
    document.getElementById('speechBubble').textContent=speeches[i];
    document.getElementById('loadingSub').textContent=subMsgs[i];
  },1600);

  try{
    const res=await fetch(`${WORKER}/?url=${encodeURIComponent(url)}`);
    const d=await res.json();
    if(d.error)throw new Error(d.error);
    clearInterval(timer);
    renderResult(d);
  }catch(e){
    clearInterval(timer);
    document.getElementById('loadingScene').style.display='none';
    document.getElementById('errorBox').style.display='block';
    resetBtn();
  }
}

function resetBtn(){
  document.getElementById('diagBtn').classList.remove('running');
  document.getElementById('scanBar').style.display='none';
  document.getElementById('btnLabel').textContent='診断する';
}

function renderResult(d){
  document.getElementById('loadingScene').style.display='none';
  resetBtn();

  const sec=secScore(d.isSSL,d.isWordPress);
  const scores=[d.mobile,d.desktop,d.seo||60,sec,d.isWordPress?50:85];
  const avg=Math.round(scores.reduce((a,b)=>a+b)/scores.length);
  const risk=(!d.isSSL||d.mobile<50)?'高':d.mobile<70?'中':'低';

  document.getElementById('aiBubble').textContent=aiComment(d);

  const banner=document.getElementById('riskBanner');
  banner.className='risk-banner '+(risk==='高'?'risk-high':risk==='中'?'risk-mid':'risk-low');
  document.getElementById('riskTitle').textContent=risk==='高'?'⚠️ 早急な改善が必要な状態です':risk==='中'?'△ 改善の余地があります':'✅ 基本的に良好です';
  document.getElementById('riskDesc').textContent=`総合スコア ${avg}/100　｜　${d.url}`;

  setScore('s-mobile','t-mobile',d.mobile);
  setScore('s-desktop','t-desktop',d.desktop);
  setScore('s-seo','t-seo',d.seo||60);
  setScore('s-sec','t-sec',sec);

  document.getElementById('sslVal').textContent=d.isSSL?'✅ 設定済み':'❌ 未設定';
  document.getElementById('sslVal').className='ic-val '+(d.isSSL?'c-ok':'c-danger');
  document.getElementById('wpVal').textContent=d.isWordPress?'⚠️ 使用中':'✅ 非使用';
  document.getElementById('wpVal').className='ic-val '+(d.isWordPress?'c-warn':'c-ok');

  const pts=buildProposals(d);
  document.getElementById('proposalPoints').innerHTML=pts.map((p,i)=>`
    <div class="prop-item ${p.c}" style="animation-delay:${i*.12+.1}s">
      <div class="prop-head">${p.h}</div>
      <div class="prop-body">${p.b}</div>
    </div>`).join('');

  document.getElementById('resultArea').style.display='block';
  setTimeout(()=>drawRadar(scores),150);
}

document.getElementById('urlInput').addEventListener('keypress',e=>{if(e.key==='Enter')diagnose()});
</script>
