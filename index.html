<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホームページ診断ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f0f4f8;color:#333}
header{background:#223670;color:#fff;padding:20px;text-align:center}
header h1{font-size:20px;font-weight:500}
header p{font-size:12px;margin-top:5px;opacity:.8}
.container{max-width:800px;margin:24px auto;padding:0 16px}
.input-box{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:20px}
.input-box h2{font-size:15px;margin-bottom:12px;color:#223670;font-weight:500}
.input-row{display:flex;gap:8px}
input[type=text]{flex:1;padding:11px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none;font-family:inherit}
input[type=text]:focus{border-color:#223670}
.btn-diagnose{background:#D0A900;color:#fff;border:none;padding:11px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;position:relative;overflow:hidden;white-space:nowrap;transition:background .2s}
.btn-diagnose:hover{background:#b89200}
.btn-diagnose.running{background:#223670;pointer-events:none}
.scan-line{position:absolute;left:0;top:-2px;width:100%;height:2px;background:rgba(255,255,255,.7);display:none;animation:scan .7s linear infinite}
@keyframes scan{0%{top:-2px}100%{top:102%}}
.loading-area{display:none;text-align:center;padding:40px 0}
.radar-wrap{position:relative;width:140px;height:140px;margin:0 auto 16px}
.pulse{position:absolute;inset:0;border-radius:50%;border:2px solid #223670;animation:pulse 1.4s ease-out infinite;opacity:0}
.pulse:nth-child(2){animation-delay:.45s}
.pulse:nth-child(3){animation-delay:.9s}
@keyframes pulse{0%{transform:scale(.5);opacity:.9}100%{transform:scale(1.5);opacity:0}}
.radar-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:52px;color:#223670}
.loading-msg{font-size:13px;color:#666;animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.result-area{display:none}
.risk-banner{border-radius:12px;padding:16px 20px;margin-bottom:16px;color:#fff;animation:slideIn .4s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.risk-banner h2{font-size:17px;font-weight:500}
.risk-banner p{font-size:12px;margin-top:4px;opacity:.85}
.risk-high{background:#c62828}
.risk-mid{background:#e65100}
.risk-low{background:#2e7d32}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.chart-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center}
.chart-card h3{font-size:12px;color:#888;margin-bottom:10px;font-weight:400}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.sc{background:#fff;border-radius:10px;padding:12px 8px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sc-lbl{font-size:10px;color:#888;margin-bottom:4px}
.sc-num{font-size:26px;font-weight:700;line-height:1}
.sc-tag{font-size:10px;margin-top:3px}
.c-danger{color:#c62828}.c-warn{color:#e65100}.c-ok{color:#2e7d32}
.info-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-card{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;gap:10px}
.info-icon{font-size:22px}
.info-lbl{font-size:10px;color:#888}
.info-val{font-size:13px;font-weight:700;margin-top:2px}
.proposal-box{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.proposal-box h3{font-size:14px;font-weight:700;color:#223670;border-bottom:2px solid #223670;padding-bottom:8px;margin-bottom:12px}
.sp{border-left:3px solid #223670;padding:10px 14px;margin-bottom:8px;border-radius:0 8px 8px 0;background:#f8f9ff;font-size:13px;line-height:1.7;animation:fadeIn .5s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.sp:nth-child(1){animation-delay:.1s}
.sp:nth-child(2){animation-delay:.2s}
.sp:nth-child(3){animation-delay:.3s}
.sp:nth-child(4){animation-delay:.4s}
.sp.urgent{border-color:#c62828;background:#fff8f8}
.sp.warn{border-color:#e65100;background:#fff9f5}
.sp.good{border-color:#2e7d32;background:#f5fff6}
.error-box{background:#fff3f3;border:1px solid #ffcdd2;border-radius:12px;padding:20px;text-align:center;color:#c62828;display:none;margin-bottom:16px;font-size:14px}
@media(max-width:600px){
  .two-col{grid-template-columns:1fr}
  .input-row{flex-direction:column}
}
</style>
</head>
<body>
<header>
  <h1>🔍 ホームページ診断ツール</h1>
  <p>URLを入力するだけで、Googleのデータでサイトの課題を即診断します</p>
</header>
<div class="container">
  <div class="input-box">
    <h2>診断したいホームページのURLを入力してください</h2>
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="https://example.com"/>
      <button class="btn-diagnose" id="diagBtn" onclick="diagnose()">
        <span class="scan-line" id="scanLine"></span>
        <span id="btnLabel">診断する</span>
      </button>
    </div>
  </div>

  <div class="error-box" id="errorBox">⚠️ 診断に失敗しました。URLを確認してもう一度お試しください。</div>

  <div class="loading-area" id="loadingArea">
    <div class="radar-wrap">
      <div class="pulse"></div>
      <div class="pulse"></div>
      <div class="pulse"></div>
      <div class="radar-icon">📡</div>
    </div>
    <div class="loading-msg" id="loadingMsg">Googleのデータで診断中...</div>
  </div>

  <div class="result-area" id="resultArea">
    <div class="risk-banner" id="riskBanner">
      <h2 id="riskTitle"></h2>
      <p id="riskDesc"></p>
    </div>
    <div class="two-col">
      <div class="chart-card">
        <h3>⬠ 総合スコア（レーダーチャート）</h3>
        <div style="position:relative;height:200px">
          <canvas id="radarChart"></canvas>
        </div>
      </div>
      <div>
        <div class="score-grid">
          <div class="sc"><div class="sc-lbl">📱 モバイル</div><div class="sc-num" id="s-mobile">-</div><div class="sc-tag" id="t-mobile"></div></div>
          <div class="sc"><div class="sc-lbl">💻 PC速度</div><div class="sc-num" id="s-desktop">-</div><div class="sc-tag" id="t-desktop"></div></div>
          <div class="sc"><div class="sc-lbl">🔍 SEO</div><div class="sc-num" id="s-seo">-</div><div class="sc-tag" id="t-seo"></div></div>
          <div class="sc"><div class="sc-lbl">🛡 保守性</div><div class="sc-num" id="s-sec">-</div><div class="sc-tag" id="t-sec"></div></div>
        </div>
        <div class="info-row">
          <div class="info-card">
            <div class="info-icon">🔒</div>
            <div><div class="info-lbl">SSL</div><div class="info-val" id="sslVal"></div></div>
          </div>
          <div class="info-card">
            <div class="info-icon">🌐</div>
            <div><div class="info-lbl">WordPress</div><div class="info-val" id="wpVal"></div></div>
          </div>
        </div>
      </div>
    </div>
    <div class="proposal-box">
      <h3>💡 ご提案内容</h3>
      <div id="salesPoints"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const WORKER_URL='https://hp-sindan-api.yymmatsu.workers.dev';
let radarChart=null;
const msgs=['Googleのデータで診断中...','セキュリティを確認中...','SEOスコアを計算中...','WordPressを解析中...','レポートを生成中...'];

function cls(s){return s<50?'c-danger':s<70?'c-warn':'c-ok'}
function tag(s){return s<50?'⚠ 要改善':s<70?'△ やや弱い':'✓ 良好'}

function secScore(ssl,wp){
  let s=80;
  if(!ssl)s-=40;
  if(wp)s-=20;
  return Math.max(0,s);
}

function proposals(d){
  const pts=[];
  if(d.mobile<50) pts.push({c:'urgent',t:'📱 モバイルの表示速度が非常に遅い状態です。スマホユーザーの大半が離脱しているリスクがあります。リニューアルの最優先事項としてご提案します。'});
  else if(d.mobile<70) pts.push({c:'warn',t:'📱 モバイル速度がやや遅めです。スマホ対応の最適化でユーザー体験を大きく改善できます。'});
  if(d.desktop<50) pts.push({c:'urgent',t:'💻 PC表示速度も遅く、第一印象で損をしています。画像最適化やキャッシュ設定の見直しをご提案します。'});
  if(!d.isSSL) pts.push({c:'urgent',t:'🔓 SSLが未設定です。「保護されていない通信」と表示されており、信頼性を大きく損なっています。即時対応をお勧めします。'});
  if(d.isWordPress) pts.push({c:'warn',t:'⚠️ WordPressが使われています。更新が滞るとウイルス感染や不正アクセスのリスクが高まります。セキュリティ対策をご提案します。'});
  if(d.seo>0&&d.seo<50) pts.push({c:'urgent',t:'🔍 SEOスコアが低く、Googleの検索結果で不利な状態です。メタ情報の整備とコンテンツ構成の見直しをご提案します。'});
  else if(d.seo>0&&d.seo<70) pts.push({c:'warn',t:'🔍 SEOにまだ改善の余地があります。コンテンツ構成を見直すことで集客力が向上します。'});
  if(pts.length===0) pts.push({c:'good',t:'✅ 基本的なパフォーマンスは良好です。デザインリニューアルやコンテンツ強化で競合との差別化をご提案できます。'});
  return pts;
}

function drawRadar(scores){
  if(radarChart){radarChart.destroy();radarChart=null}
  const ctx=document.getElementById('radarChart').getContext('2d');
  radarChart=new Chart(ctx,{
    type:'radar',
    data:{
      labels:['モバイル速度','PC速度','SEO','セキュリティ','保守性'],
      datasets:[{
        label:'スコア',data:scores,
        backgroundColor:'rgba(34,54,112,.15)',
        borderColor:'#223670',borderWidth:2,
        pointBackgroundColor:'#D0A900',pointBorderColor:'#223670',pointRadius:4
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{r:{min:0,max:100,ticks:{stepSize:25,font:{size:9},color:'#888'},pointLabels:{font:{size:10}}}},
      plugins:{legend:{display:false}}
    }
  });
}

function setScore(id,tid,v){
  const el=document.getElementById(id);
  el.textContent=v;el.className='sc-num '+cls(v);
  const tEl=document.getElementById(tid);
  tEl.textContent=tag(v);tEl.className='sc-tag '+cls(v);
}

async function diagnose(){
  let url=document.getElementById('urlInput').value.trim();
  if(!url){alert('URLを入力してください');return}
  if(!url.startsWith('http'))url='https://'+url;

  document.getElementById('resultArea').style.display='none';
  document.getElementById('errorBox').style.display='none';
  document.getElementById('loadingArea').style.display='block';
  document.getElementById('diagBtn').classList.add('running');
  document.getElementById('scanLine').style.display='block';
  document.getElementById('btnLabel').textContent='診断中...';

  let i=0;
  const timer=setInterval(()=>{
    i=(i+1)%msgs.length;
    document.getElementById('loadingMsg').textContent=msgs[i];
  },1500);

  try{
    const res=await fetch(`${WORKER_URL}/?url=${encodeURIComponent(url)}`);
    const d=await res.json();
    if(d.error)throw new Error(d.error);

    clearInterval(timer);
    document.getElementById('loadingArea').style.display='none';
    document.getElementById('diagBtn').classList.remove('running');
    document.getElementById('scanLine').style.display='none';
    document.getElementById('btnLabel').textContent='診断する';

    const sec=secScore(d.isSSL,d.isWordPress);
    const scores=[d.mobile,d.desktop,d.seo||60,sec,d.isWordPress?50:85];
    const avg=Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
    const risk=d.risk||( d.mobile<50?'高':d.mobile<70?'中':'低');

    const banner=document.getElementById('riskBanner');
    banner.className='risk-banner '+(risk==='高'?'risk-high':risk==='中'?'risk-mid':'risk-low');
    document.getElementById('riskTitle').textContent=risk==='高'?'⚠️ 早急な改善が必要な状態です':risk==='中'?'△ 改善の余地があります':'✅ 基本的に良好です';
    document.getElementById('riskDesc').textContent=`総合スコア ${avg}/100　｜　${d.url}`;

    setScore('s-mobile','t-mobile',d.mobile);
    setScore('s-desktop','t-desktop',d.desktop);
    setScore('s-seo','t-seo',d.seo||60);
    setScore('s-sec','t-sec',sec);

    document.getElementById('sslVal').textContent=d.isSSL?'✅ 設定済み':'❌ 未設定';
    document.getElementById('sslVal').className='info-val '+(d.isSSL?'c-ok':'c-danger');
    document.getElementById('wpVal').textContent=d.isWordPress?'⚠️ 使用中':'✅ 非使用';
    document.getElementById('wpVal').className='info-val '+(d.isWordPress?'c-warn':'c-ok');

    document.getElementById('salesPoints').innerHTML=proposals(d).map(p=>`<div class="sp ${p.c}">${p.t}</div>`).join('');
    document.getElementById('resultArea').style.display='block';
    setTimeout(()=>drawRadar(scores),100);

  }catch(e){
    clearInterval(timer);
    document.getElementById('loadingArea').style.display='none';
    document.getElementById('errorBox').style.display='block';
    document.getElementById('diagBtn').classList.remove('running');
    document.getElementById('scanLine').style.display='none';
    document.getElementById('btnLabel').textContent='診断する';
  }
}

document.getElementById('urlInput').addEventListener('keypress',e=>{
  if(e.key==='Enter')diagnose();
});
</script>
</body>
</html>
